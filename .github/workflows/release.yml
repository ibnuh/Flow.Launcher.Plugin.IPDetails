name: Publish

on:
    push:
        tags: ['v*']

jobs:
    build:
        runs-on: windows-latest
        permissions:
            contents: write

        steps:
            - uses: actions/checkout@v3

            - name: Get version
              id: version
              uses: notiz-dev/github-action-json-property@release
              with:
                  path: Flow.Launcher.Plugin.IPDetails/plugin.json
                  prop_path: Version

            - name: Verify tag matches plugin.json version
              shell: pwsh
              run: |
                  $tag = '${{ github.ref_name }}'
                  $version = 'v${{ steps.version.outputs.prop }}'
                  if ($tag -ne $version) {
                      Write-Error "Tag '$tag' does not match plugin.json Version '$version'. Bump plugin.json Version to match the tag before tagging a release."
                      exit 1
                  }
                  Write-Host "Tag '$tag' matches plugin.json Version."

            - name: Setup .NET
              uses: actions/setup-dotnet@v3
              with:
                  dotnet-version: 9.x

            - name: Build
              shell: pwsh
              run: |
                  dotnet publish Flow.Launcher.Plugin.IPDetails/Flow.Launcher.Plugin.IPDetails.csproj -c Release -o Output
                  Compress-Archive -Path Output/* -DestinationPath Flow.Launcher.Plugin.IPDetails.zip -Force

            - name: Publish
              uses: softprops/action-gh-release@v1
              with:
                  files: Flow.Launcher.Plugin.IPDetails.zip
                  tag_name: ${{ github.ref_name }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
